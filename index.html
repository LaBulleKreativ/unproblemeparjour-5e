      "questions": [
        "a) Calcule le coût total avant réduction.",
        "b) Calcule le montant de la réduction.",
        "c) Combien paie-t-elle en tout ?",
        "d) Bon courage pour la rentrée en 4ᵉ !"
      ]
    },
    "correction": "a) Détails : cahiers \\(12\\) € ; calculatrices \\(44\\) € ; stylos \\(14{,}40\\) € ; trousses \\(25{,}50\\) €.<br>Total : \\(12 + 44 + 14{,}40 + 25{,}50 = \\mathbf{95{,}90}\\) €.<br><br>b) Réduction : \\(95{,}90 \\times 0{,}10 = \\mathbf{9{,}59}\\) €.<br><br>c) Total payé : \\(95{,}90 \\times 0{,}9 = \\mathbf{86{,}31}\\) €.<br><br>d) 🎒 <b>Excellente rentrée à tous !</b> Tu es prêt(e) pour la 4ᵉ. 💪"
  }
];
const now = new Date();
//const now = new Date('2026-07-15');
function dateOnly(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function parseISO(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function formaterDateFr(d) {
  const jours = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const mois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
}

const AUJ = dateOnly(now);

function indexCourant() {
  for (let i = 0; i < EXOS.length; i++) {
    const dateExo = parseISO(EXOS[i].date);
    if (AUJ.getTime() === dateExo.getTime()) return i;
  }
  if (AUJ < parseISO(EXOS[0].date)) return -1;
  return EXOS.length - 1;
}

let idx = indexCourant();

const elContenu = document.getElementById('contenu');
const elSelect = document.getElementById('select-jour');
const elDateAuj = document.getElementById('date-aujourdhui');
const btnPrec = document.getElementById('btn-prec');
const btnSuiv = document.getElementById('btn-suiv');
const btnAuj = document.getElementById('btn-auj');

elDateAuj.textContent = "📅 " + formaterDateFr(AUJ);

function rebuildSelect() {
  elSelect.innerHTML = '';
  EXOS.forEach((exo, i) => {
    const dateExo = parseISO(exo.date);
    if (dateExo <= AUJ) {
      const opt = document.createElement('option');
      opt.value = i;
      const j = dateExo.getDate();
      const moisCourts = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
      opt.textContent = `Jour ${i+1} — ${j} ${moisCourts[dateExo.getMonth()]}`;
      elSelect.appendChild(opt);
    }
  });
}

function afficherJour(i) {
  if (i < 0) {
    elContenu.innerHTML = `
      <div class="attente">
        <span class="icone">⏳</span>
        <h2>Bientôt&nbsp;!</h2>
        <p>Le premier exercice sera disponible le <strong>1ᵉʳ juillet 2026</strong>.</p>
        <p>Reviens à cette date pour commencer ton entraînement quotidien&nbsp;!</p>
      </div>`;
    btnPrec.disabled = true; btnSuiv.disabled = true;
    elSelect.style.display = 'none';
    return;
  }

  elSelect.style.display = '';
  const exo = EXOS[i];
  const dateExo = parseISO(exo.date);
  const correctionVisible = AUJ.getTime() > dateExo.getTime();

  // Aide de cours
  const coursHTML = exo.cours ? `
    <div class="carte">
      <h2><span class="badge badge-cours">Aide de cours</span></h2>
      <div class="cours-bloc">${exo.cours}</div>
    </div>` : '';

  // Automatismes
  const automatismesHTML = exo.automatismes.map((a, k) => `
    <li>
      <div><strong>Question ${k+1} :</strong> ${a.q}</div>
      <button class="toggle-rep" data-jour="${i}" data-k="${k}">Voir la réponse</button>
      <div class="reponse" id="rep-${i}-${k}"><strong>Réponse :</strong> ${a.r}</div>
    </li>`).join('');

  // Repère (optionnel)
  const repereHTML = exo.probleme.repere ? exo.probleme.repere : '';

  // Problème
  const questionsHTML = exo.probleme.questions.map(q => `<li>${q}</li>`).join('');

  // Correction
  const correctionHTML = correctionVisible
    ? `<div class="correction">${exo.correction}</div>`
    : `<div class="correction-locked">
         <span class="icone">🔒</span>
         <div>La correction sera disponible <strong>demain</strong>.</div>
         <div style="margin-top:0.5rem;">Prends d'abord le temps de chercher par toi-même&nbsp;!</div>
       </div>`;

  elContenu.innerHTML = `
    <div class="carte">
      <h2>📆 Jour ${i+1} — ${formaterDateFr(dateExo)}</h2>
      <div class="theme">Thème du jour : <strong>${exo.theme}</strong></div>
    </div>

    ${coursHTML}

    <div class="carte">
      <h2><span class="badge badge-auto">Automatismes</span> 3 questions pour s'échauffer</h2>
      <div class="automatismes">
        <ol>${automatismesHTML}</ol>
      </div>
    </div>

    <div class="carte probleme">
      <h2><span class="badge badge-pb">Problème du jour</span></h2>
      <h3>${exo.probleme.titre}</h3>
      <div class="enonce">${exo.probleme.enonce}</div>
      ${repereHTML}
      <ol class="questions">${questionsHTML}</ol>
    </div>

    <div class="carte">
      <h2><span class="badge badge-corr">Correction</span></h2>
      ${correctionHTML}
    </div>
  `;

  document.querySelectorAll('.toggle-rep').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.k;
      const jour = btn.dataset.jour;
      const rep = document.getElementById(`rep-${jour}-${k}`);
      const visible = rep.classList.toggle('visible');
      btn.textContent = visible ? 'Masquer la réponse' : 'Voir la réponse';
    });
  });

  elSelect.value = i;
  btnPrec.disabled = (i <= 0);
  let dernierVisible = -1;
  for (let j = 0; j < EXOS.length; j++) {
    if (parseISO(EXOS[j].date) <= AUJ) dernierVisible = j;
  }
  btnSuiv.disabled = (i >= dernierVisible);

  if (window.renderMathInElement) {
    renderMathInElement(elContenu, {
      delimiters: [{left:'\\(', right:'\\)', display:false},{left:'\\[', right:'\\]', display:true}],
      throwOnError: false
    });
  }
}

elSelect.addEventListener('change', e => { idx = parseInt(e.target.value); afficherJour(idx); });
btnPrec.addEventListener('click', () => { if (idx > 0) { idx--; afficherJour(idx); } });
btnSuiv.addEventListener('click', () => { idx++; afficherJour(idx); });
btnAuj.addEventListener('click', () => { idx = indexCourant(); afficherJour(idx); });

rebuildSelect();
afficherJour(idx);

window.addEventListener('load', () => {
  if (window.renderMathInElement) {
    renderMathInElement(document.body, {
      delimiters: [{left:'\\(', right:'\\)', display:false},{left:'\\[', right:'\\]', display:true}],
      throwOnError: false
    });
  }
});
</script>
</body>
</html>
